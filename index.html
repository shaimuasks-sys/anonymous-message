<!DOCTYPE html>
<html>
<head>
  <title>Send Me Anonymous Message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h2 {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      resize: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #00a2d4;
    }

    .note {
      font-size: 12px;
      margin-top: 15px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Send Me Anonymous Message</h2>

  <form action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST">
    <textarea name="message" placeholder="Type your anonymous message..." required></textarea>
    
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    
    <button type="submit">Send Message</button>
  </form>

  <div class="note">
    Your identity will remain anonymous.
  </div>
</div>

</body>
</html>
